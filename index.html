<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Martina López Parafita — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── REVISTA ── -->
  <main class="mag" id="mag">

    <!-- Navegación de secciones (aparece una vez pasado el índice) -->
    <nav class="topnav" id="topnav" hidden>
      <div class="topnav__inner" id="topnavInner"><!-- pestañas inyectadas por JS --></div>
    </nav>

    <div class="book" id="book">
      <div class="book__stage" id="stage">
        <!-- páginas inyectadas por JS -->
      </div>
      <!-- Flechas pegadas a la revista -->
      <button class="ctrl ctrl--prev" id="navPrev" aria-label="Página anterior" hidden>&#8592;</button>
      <button class="ctrl ctrl--next" id="navNext" aria-label="Página siguiente" hidden>&#8594;</button>
    </div>
  </main>

  <!-- ── DESPLIEGUE DE TRABAJO ── -->
  <section class="work" id="work" aria-hidden="true">
    <div class="work__bar">
      <div class="work__heading">
        <span class="work__eyebrow" id="workEyebrow"></span>
        <h2 class="work__title" id="workTitle"></h2>
        <span class="work__meta" id="workMeta"></span>
        <p class="work__desc" id="workDesc"></p>
      </div>
      <button class="work__close" id="workClose" aria-label="Cerrar">Volver a la revista &#10005;</button>
    </div>
    <div class="work__body" id="workBody"></div>
  </section>

  <!-- ── LIGHTBOX ── -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" id="lbClose" aria-label="Cerrar">&#10005;</button>
    <button class="lightbox__prev" id="lbPrev" aria-label="Anterior">&#8592;</button>
    <button class="lightbox__next" id="lbNext" aria-label="Siguiente">&#8594;</button>
    <div class="lightbox__media" id="lbMedia"></div>
    <p class="lightbox__caption" id="lbCaption"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Martina Lopez Parafita — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HERO ── -->
  <section class="hero" id="hero">
    <div class="carousel" id="carousel">
      <!-- slides injected by JS -->
    </div>
    <div class="hero-overlay"></div>

    <nav class="top-nav">
      <span class="nav-logo">MLP</span>
      <ul class="nav-links">
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#contact">Contacto</a></li>
      </ul>
    </nav>

    <div class="hero-content">
      <p class="hero-eyebrow">Photography &amp; Visual Art</p>
      <h1 class="hero-name">
        <span class="line-first">Martina</span>
        <span class="line-last">López Parafita</span>
      </h1>
    </div>

    <a href="#portfolio" class="scroll-hint" aria-label="Scroll down">
      <span class="scroll-hint__line"></span>
    </a>

    <!-- carousel dots -->
    <div class="carousel-dots" id="carouselDots"></div>
  </section>

  <!-- ── PORTFOLIO ── -->
  <section class="portfolio" id="portfolio">
    <!-- Sidebar -->
    <aside class="sidebar">
      <p class="sidebar-heading">Proyectos</p>
      <ul class="sidebar-list" id="sidebarList">
        <!-- injected by JS -->
      </ul>
    </aside>

    <!-- Grid -->
    <div class="gallery-wrap">
      <div class="gallery-header">
        <h2 class="gallery-title" id="galleryTitle"></h2>
        <div class="gallery-meta">
          <span class="gallery-role" id="galleryRole"></span>
          <span class="gallery-sep" id="gallerySep"></span>
          <span class="gallery-artist" id="galleryArtist"></span>
        </div>
      </div>
      <div class="masonry" id="masonryGrid">
        <!-- injected by JS -->
      </div>
    </div>
  </section>

  <!-- ── LIGHTBOX ── -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" id="lbClose" aria-label="Cerrar">&#10005;</button>
    <button class="lightbox__prev" id="lbPrev" aria-label="Anterior">&#8592;</button>
    <button class="lightbox__next" id="lbNext" aria-label="Siguiente">&#8594;</button>
    <div class="lightbox__media" id="lbMedia"></div>
    <p class="lightbox__caption" id="lbCaption"></p>
  </div>

  <!-- ── CONTACT ── -->
  <footer class="contact" id="contact">
    <div class="contact-inner">
      <p class="contact-eyebrow">Get in touch</p>
      <h2 class="contact-heading">Trabajemos juntos</h2>
      <a href="mailto:hola@martinalopezparafita.com" class="contact-email">
        hola@martinalopezparafita.com
      </a>
      <div class="contact-socials">
        <a href="#" target="_blank" rel="noopener">Instagram</a>
        <a href="#" target="_blank" rel="noopener">Behance</a>
        <a href="#" target="_blank" rel="noopener">LinkedIn</a>
      </div>
      <p class="contact-copy">&copy; 2025 Martina Lopez Parafita. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
